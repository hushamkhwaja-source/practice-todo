<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <h1>My To-Do List</h1>

    <form id="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="What do you need to do?"
        autocomplete="off"
      >
      <button type="submit">Add</button>
    </form>

    <ul id="todo-list"></ul>

    <p id="empty-message">Nothing here yet — add your first task above!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
